<body>

<div class="widget-container">
    <div class="info-panel">
        <div>집계 기준: 해당 기간 내 작성글</div>
        <div>정렬 방식: 누적 조회수 (댓글 무관)</div>
        <div id="last-update-time"> 업데이트</div>
    </div>
    
    <div class="tabs">
        <button id="tab-daily" onclick="loadPopular('daily')" class="active">일간</button>
        <button id="tab-weekly" onclick="loadPopular('weekly')">주간</button>
        <button id="tab-monthly" onclick="loadPopular('monthly')">월간</button>
    </div>

    <ul id="popular-content" class="post-list">
        <li class="status-msg">데이터 수신 중...</li>
    </ul>
</div>

<script>
const API_URL = 'https://red52.kr/popular_posts_api.php';
const SITE_URL = 'https://red52.kr'; 

let cachedData = null;

function getLastUpdateTimeString() {
    const now = new Date();
    if (now.getHours() < 1) {
        now.setDate(now.getDate() - 1);
    }
    now.setHours(1, 0, 0, 0); 

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');

    return `마지막 갱신: ${year}-${month}-${day} ${hours}:${minutes}`;
}

function renderList(posts) {
    if (!posts || posts.length === 0) {
        return '<li class="status-msg error-msg">조건에 맞는 데이터가 없습니다.</li>';
    }
    
    return posts.map((post, index) => {
        const rankClass = index < 3 ? 'rank rank-top' : 'rank';
        const midPath = post.mid ? `/${post.mid}` : ''; 
        const url = `${SITE_URL}${midPath}/${post.document_srl}`;
        const safeTitle = (post.title || '제목 없음').trim(); 

        return `
        <li>
            <span class="${rankClass}">${index + 1}</span>
            <a href="${url}" class="post-link" target="_blank" rel="noopener noreferrer" title="${safeTitle}">
                ${safeTitle}
            </a>
        </li>
        `;
    }).join('');
}

function updateTabUI(activePeriod) {
    ['daily', 'weekly', 'monthly'].forEach(period => {
        document.getElementById(`tab-${period}`).classList.remove('active');
    });
    document.getElementById(`tab-${activePeriod}`).classList.add('active');
}

function loadPopular(period) {
    const container = document.getElementById('popular-content');
    updateTabUI(period);
    
    if (cachedData) {
        container.innerHTML = renderList(cachedData[period]);
        return;
    }

    fetch(API_URL)
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            if(data.error) throw new Error(data.error);
            cachedData = data;
            container.innerHTML = renderList(data[period]);
            document.getElementById('last-update-time').innerText = getLastUpdateTimeString();
        })
        .catch(error => {
            container.innerHTML = '<li class="status-msg error-msg">데이터 연결 실패 (API 확인 필요)</li>';
            document.getElementById('last-update-time').innerText = "업데이트 시간 확인 불가";
        });
}

document.addEventListener("DOMContentLoaded", () => loadPopular('daily'));
</script>

</body>
