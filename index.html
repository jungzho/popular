    <!-- Canonical URL (중복 문서 방지를 위한 대표 URL 지정 - 실제 위젯이 있는 경로로 수정하세요) -->

    <!-- Open Graph (페이스북, 카카오톡, 텔레그램 등 소셜 공유 썸네일 및 정보) -->

    <meta property="og:title" content="인기 BJ 야동 순위 - 실시간 베스트 대시보드 | RED52">

    <meta property="og:url" content="https://popular.red52.kr/">
    <meta property="og:site_name" content="RED52">
    <!-- og:image는 사이트의 실제 대표 썸네일 이미지 절대 경로로 변경하세요 -->
    <meta property="og:image" content="https://red52.kr/files/attach/site_image/site_image.1714131061.png"> 

    <!-- Twitter Cards (트위터 공유용) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="인기 BJ 야동 순위 - 실시간 베스트 대시보드 | RED52">
    <meta name="twitter:description" content="매일 업데이트되는 RED52 실시간 인기 BJ 야동 순위. 일간, 주간, 월간 베스트 영상을 지금 바로 확인하세요.">
    <!-- twitter:image 역시 실제 대표 썸네일 이미지 절대 경로로 변경하세요 -->
    <meta name="twitter:image" content="https://red52.kr/files/attach/site_image/site_image.1714131061.png">
    <meta name="twitter:domain" content="red52.kr">

    <!-- 파비콘 설정 -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <style>
        /* 실시간 대시보드 다크 테마 */
        body { 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            background-color: #0d1117; /* 깊은 다크 배경 */
            margin: 0; 
            padding: 20px; 
            color: #c9d1d9;
        }
        
        .widget-container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: #161b22; /* 패널 배경 */
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #30363d;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.05); 
        }

        /* 상단 헤더 및 애니메이션 포인트 */
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        h3 { 
            margin: 0; 
            color: #fff; 
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 깜빡이는 실시간 느낌의 빨간/녹색 점 */
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #2ea043; /* 형광 녹색 */
            border-radius: 50%;
            box-shadow: 0 0 8px #2ea043;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 집계 기준 안내 문구 */
        .info-panel {
            background: #0d1117;
            border: 1px dashed #30363d;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 15px;
            font-size: 0.75rem;
            color: #8b949e;
            line-height: 1.4;
        }
        .info-highlight { color: #58a6ff; font-weight: bold; }

        /* 탭 버튼 디자인 (주식창 탭 느낌) */
        .tabs { 
            display: flex; 
            gap: 5px;
            margin-bottom: 15px; 
            background: #0d1117;
            padding: 4px;
            border-radius: 6px;
        }
        .tabs button { 
            flex: 1; 
            background: transparent; 
            border: 1px solid transparent; 
            padding: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #8b949e; 
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .tabs button:hover {
            color: #c9d1d9;
        }
        .tabs button.active { 
            background: #21262d; 
            color: #58a6ff; /* 형광 파랑 */
            border: 1px solid #30363d;
            box-shadow: inset 0 2px 0 #58a6ff; /* 상단 하이라이트 */
        }

        /* 리스트 및 랭킹 디자인 */
        .post-list { list-style: none; padding: 0; margin: 0; }
        .post-list li { 
            padding: 10px 8px; 
            border-bottom: 1px solid #21262d; 
            display: flex; 
            align-items: center;
            transition: background 0.2s;
        }
        .post-list li:last-child { border-bottom: none; }
        .post-list li:hover { background: #1c2128; border-radius: 6px; }

        .rank { 
            font-family: 'Courier New', Courier, monospace; /* 전광판 느낌의 숫자 폰트 */
            font-weight: bold; 
            width: 28px; 
            flex-shrink: 0; 
            color: #8b949e;
            font-size: 1.1rem;
        }
        
        /* 1, 2, 3위 특별 컬러 (금, 은, 동/네온) */
        .rank-1 { color: #d2a8ff; text-shadow: 0 0 5px rgba(210,168,255,0.4); } /* 네온 퍼플 */
        .rank-2 { color: #58a6ff; text-shadow: 0 0 5px rgba(88,166,255,0.4); }  /* 네온 블루 */
        .rank-3 { color: #3fb950; text-shadow: 0 0 5px rgba(63,185,80,0.4); }   /* 네온 그린 */

        .post-link { 
            text-decoration: none; 
            color: #e6edf3; 
            display: block; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            font-size: 0.9rem;
        }
        .post-link:hover { 
            color: #58a6ff; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="header-box">
        <h3><span class="pulse-dot"></span> TRENDING</h3>
        <span style="font-size: 0.7rem; color: #8b949e; font-family: monospace;">SYS.ONLINE</span>
    </div>

    <!-- 집계 방식 안내 전광판 -->
    <div class="info-panel">
        <div>📈 <strong>집계 기준:</strong> 해당 기간 내 작성글</div>
        <div>💡 <strong>정렬 방식:</strong> 누적 <span class="info-highlight">조회수</span> (댓글 무관)</div>
        <div style="margin-top:4px; font-size:0.7rem; opacity:0.8;">⏱️ 매일 새벽 1회 자동 갱신됩니다.</div>
    </div>
    
    <div class="tabs">
        <button id="tab-daily" onclick="loadPopular('daily')" class="active">일간 (어제)</button>
        <button id="tab-weekly" onclick="loadPopular('weekly')">주간 (7일)</button>
        <button id="tab-monthly" onclick="loadPopular('monthly')">월간 (30일)</button>
    </div>

    <ul id="popular-content" class="post-list">
        <li style="color:#8b949e; justify-content:center; padding: 20px 0;">데이터 수신 중...</li>
    </ul>
</div>

<script>
// 본 서버의 API 주소
const API_URL = 'https://red52.kr/popular_posts_api.php';
// 링크 클릭 시 이동할 본 서버의 기본 주소
const SITE_URL = 'https://red52.kr'; 

let cachedData = null;

function renderList(posts) {
    if (!posts || posts.length === 0) return "<li style='justify-content:center; color:#ff7b72;'>조건에 맞는 데이터가 없습니다.</li>";
    
    return posts.map((post, index) => {
        // 상위 1, 2, 3위에 색상 클래스 부여
        let rankClass = "rank";
        if(index === 0) rankClass += " rank-1";
        if(index === 1) rankClass += " rank-2";
        if(index === 2) rankClass += " rank-3";

        return `
        <li>
            <span class="${rankClass}">${index + 1}</span>
            <a href="${SITE_URL}/${post.document_srl}" class="post-link" target="_blank" rel="noopener noreferrer" title="${post.title}">
                ${post.title}
            </a>
        </li>
        `;
    }).join('');
}

function updateTabUI(activePeriod) {
    ['daily', 'weekly', 'monthly'].forEach(period => {
        document.getElementById(`tab-${period}`).classList.remove('active');
    });
    document.getElementById(`tab-${activePeriod}`).classList.add('active');
}

function loadPopular(period) {
    const container = document.getElementById('popular-content');
    updateTabUI(period);
    
    if (cachedData) {
        container.innerHTML = renderList(cachedData[period]);
        return;
    }

    fetch(API_URL)
        .then(response => response.json())
        .then(data => {
            if(data.error) throw new Error(data.error);
            cachedData = data;
            container.innerHTML = renderList(data[period]);
        })
        .catch(error => {
            console.error('Fetch error:', error);
            container.innerHTML = `<li style='color:#ff7b72; justify-content:center;'>데이터 연결 실패 (API 점검 필요)</li>`;
        });
}

// 로딩 시 주간(weekly)을 먼저 보여주려면 'weekly', 일간은 'daily'
document.addEventListener("DOMContentLoaded", () => loadPopular('daily'));
</script>

</body>
</html>
