            --text-color: #eee;

            margin: 0 !important;
            font-size: 1.0rem !important;
            font-weight: 700 !important;
            color: #fff !important;
            font-family: inherit !important;
            display: flex !important;
            align-items: center !important;
            gap: 5px !important;
        }

        .update-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--line-color);
            background: var(--surface-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            border-right: 1px solid var(--line-color);
            padding: 15px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        .tab-btn:last-child {
            border-right: none;
        }

        .tab-btn:hover {
            color: #fff;
            background: var(--surface-hover);
        }

        .tab-btn.active {
            color: var(--accent-color);
            background: var(--bg-color);
            box-shadow: inset 0 2px 0 var(--accent-color);
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: var(--bg-color);
            min-height: 250px;
        }

        .post-list li {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid var(--line-color);
            transition: background 0.2s;
        }

        .post-list li:last-child { 
            border-bottom: none; 
        }

        .post-list li:hover {
            background: var(--surface-hover);
        }

        .rank {
            font-weight: 700;
            width: 20px; 
            flex-shrink: 0; 
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: -1px;
            margin-right: 5px;
        }

        .rank-top { 
            color: var(--accent-color); 
        }

        .post-link { 
            text-decoration: none; 
            color: var(--text-color); 
            display: flex; 
            align-items: center;
            flex: 1;
            min-width: 0;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .post-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.5;
        }

        .comment-count {
            flex-shrink: 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .post-link:visited {
            color: #555;
        }

        .post-link:hover { 
            color: #fff;
        }

        .info-text {
            text-align: center;
            font-size: 0.75rem;
            color: #555;
            margin-top: 15px;
        }

        .status-msg {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: block !important;
            border-bottom: none !important;
        }
    </style>

<body>

    <div class="wrapper">
        <div class="dashboard-container">
            <div class="header">
                <h2>🔥 인기 BJ 야동</h2>
                <span class="update-time" id="update-time">업데이트 대기 중</span>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-period="daily">일간</button>
                <button class="tab-btn" data-period="weekly">주간</button>
                <button class="tab-btn" data-period="monthly">월간</button>
            </div>
            <ul class="post-list" id="post-list">
                <li class="status-msg">데이터 불러오는 중</li>
            </ul>
        </div>
        <div class="info-text">[i] 해당 기간 내 작성한 게시물 누적 조회수<br>© red52.kr</div>
    </div>

    <script>
        const SITE_URL = 'https://red52.kr';
        let popularData = {};

        const mockData = {
            daily: [
                { title: "오늘자 레전드 영상 풀버전", comment_count: "42", document_srl: "1001", mid: "video" },
                { title: "실시간 반응 폭발한 사건 요약", comment_count: "38", document_srl: "1002", mid: "board" },
                { title: "새로운 비제이 데뷔 방송 하이라이트", comment_count: "25", document_srl: "1003", mid: "video" },
                { title: "갑자기 분위기 싸해진 합방", comment_count: "15", document_srl: "1004", mid: "board" },
                { title: "인방갤 실검 1위 달성", comment_count: "9", document_srl: "1005", mid: "video" },
                { title: "퇴근길 소통 방송", comment_count: "8", document_srl: "1006", mid: "board" },
                { title: "어제자 핫클립 모음", comment_count: "7", document_srl: "1007", mid: "video" },
                { title: "이슈 총정리", comment_count: "5", document_srl: "1008", mid: "board" },
                { title: "요즘 유행하는 챌린지", comment_count: "4", document_srl: "1009", mid: "video" },
                { title: "시청자 참여 컨텐츠 결과", comment_count: "2", document_srl: "1010", mid: "board" }
            ],
            weekly: [
                { title: "이번 주 최고의 직캠 모음.zip", comment_count: "156", document_srl: "2001", mid: "video" },
                { title: "주간 인기투표 1위 달성 기념", comment_count: "120", document_srl: "2002", mid: "board" },
                { title: "레전드 게스트 초대석 다시보기", comment_count: "89", document_srl: "2003", mid: "video" },
                { title: "팬미팅 현장 스케치 및 비하인드", comment_count: "77", document_srl: "2004", mid: "board" },
                { title: "방송사고 날 뻔한 아찔한 순간", comment_count: "65", document_srl: "2005", mid: "board" },
                { title: "주간 핫이슈 몰아보기", comment_count: "50", document_srl: "2006", mid: "video" },
                { title: "신규 비제이 랭킹 진입", comment_count: "42", document_srl: "2007", mid: "board" },
                { title: "이번 주 명장면 TOP 5", comment_count: "35", document_srl: "2008", mid: "video" },
                { title: "합방 후기 및 썰 풀이", comment_count: "30", document_srl: "2009", mid: "board" },
                { title: "다음 주 방송 일정 공지", comment_count: "21", document_srl: "2010", mid: "board" }
            ],
            monthly: [
                { title: "올해의 대상 수상자 발표 및 소감", comment_count: "450", document_srl: "3001", mid: "board" },
                { title: "역대급 리액션 모음 (조회수 100만)", comment_count: "320", document_srl: "3002", mid: "video" },
                { title: "월간 베스트 비제이 랭킹", comment_count: "280", document_srl: "3003", mid: "board" },
                { title: "구독자 100만 달성 기념 특별방송", comment_count: "210", document_srl: "3004", mid: "video" },
                { title: "최고의 케미를 보여준 합방 1위", comment_count: "195", document_srl: "3005", mid: "video" },
                { title: "이달의 신인상 후보", comment_count: "150", document_srl: "3006", mid: "board" },
                { title: "시청자가 뽑은 최고의 순간", comment_count: "120", document_srl: "3007", mid: "video" },
                { title: "야외 방송 레전드 에피소드", comment_count: "105", document_srl: "3008", mid: "video" },
                { title: "팬카페 정모 후기 모음", comment_count: "88", document_srl: "3009", mid: "board" },
                { title: "월간 종합 결산 및 Q&A", comment_count: "70", document_srl: "3010", mid: "board" }
            ]
        };

        function renderList(posts) {
            if (!posts || posts.length === 0) {
                return '<li class="status-msg error-msg">조건에 맞는 데이터가 없습니다.</li>';
            }
            
            return posts.map((post, index) => {
                const rankClass = index < 3 ? 'rank rank-top' : 'rank';
                const midPath = post.mid ? `/${post.mid}` : ''; 
                const url = `${SITE_URL}${midPath}/${post.document_srl}`;
                const safeTitle = (post.title || '제목 없음').trim(); 
                const commentCount = parseInt(post.comment_count) || 0;
                const commentHtml = commentCount > 0 ? `<span class="comment-count">[${commentCount}]</span>` : '';

                return `
                <li>
                    <span class="${rankClass}">${index + 1}</span>
                    <a href="${url}" class="post-link" target="_blank" rel="noopener noreferrer" title="${safeTitle}">
                        <span class="post-title">${safeTitle}</span>${commentHtml}
                    </a>
                </li>
                `;
            }).join('');
        }

        function updateTabUI(activePeriod) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === activePeriod);
            });
            
            const listEl = document.getElementById('post-list');
            const posts = popularData[activePeriod] || [];
            
            listEl.innerHTML = renderList(posts.slice(0, 10));
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    updateTabUI(e.target.dataset.period);
                });
            });
        }

        async function loadData() {
            try {
                const response = await fetch('https://red52.kr/popular_posts_api.php');
                if(response.ok) {
                    popularData = await response.json();
                } else {
                    throw new Error('API Error');
                }
            } catch (error) {
                console.warn('API Fetch Failed. Using Mock Data.', error);
                popularData = mockData;
            }
            
            const today = new Date();
            const dateText = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
            document.getElementById('update-time').textContent = `${dateText} 업데이트`;
            
            updateTabUI('daily');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            loadData();
        });
    </script>
</body>
