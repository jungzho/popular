<div id="popular-widget">
    <h3>🔥 인기 게시물</h3>
    
    <!-- 탭 버튼 (원하는 대로 스타일을 수정하세요) -->
    <div style="margin-bottom: 10px;">
        <button onclick="loadPopular('daily')">일간</button>
        <button onclick="loadPopular('weekly')">주간</button>
        <button onclick="loadPopular('monthly')">월간</button>
    </div>

    <!-- 리스트 출력 영역 -->
    <div id="popular-content">데이터를 불러오는 중입니다...</div>
</div>

<script>
// JSON 데이터를 전역 변수로 보관하여 탭 전환 시 재요청 방지
let cachedPopularData = null;

function renderList(posts) {
    if (!posts || posts.length === 0) return "해당 기간의 인기글이 없습니다.";
    
    let html = "<ul style='list-style:none; padding:0;'>";
    posts.forEach((post, index) => {
        const link = `/${post.document_srl}`; // 새창 열림 적용
        html += `
            <li style="margin-bottom: 8px;">
                <strong>${index + 1}.</strong> 
                <a href="${link}" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: #333;">
                    ${post.title}
                </a>
            </li>
        `;
    });
    html += "</ul>";
    return html;
}

function loadPopular(period) {
    const container = document.getElementById('popular-content');
    
    if (cachedPopularData) {
        container.innerHTML = renderList(cachedPopularData[period]);
        return;
    }

    // 캐시 방지를 위해 날짜 파라미터 추가
    const cacheBuster = new Date().toISOString().split('T')[0];
    
    fetch(`/popular_posts.json?v=${cacheBuster}`)
        .then(response => response.json())
        .then(data => {
            cachedPopularData = data;
            container.innerHTML = renderList(data[period]);
        })
        .catch(error => {
            console.error('Error:', error);
            container.innerHTML = "데이터를 불러올 수 없습니다.";
        });
}

// 기본값으로 주간(weekly) 먼저 노출
document.addEventListener("DOMContentLoaded", () => loadPopular('weekly'));
</script>
